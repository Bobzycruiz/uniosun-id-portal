<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Receipt — UNIOSUN IMTC</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-dark brand-bar no-print">
  <div class="container">
    <span class="navbar-brand mb-0 h1 d-flex align-items-center gap-2">
      <span class="brand-crest">ID</span>
      Osun State University &mdash; IMTC
    </span>
  </div>
</nav>

<div class="container py-4 py-md-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">

      <div class="alert alert-success no-print" id="topAlert">
        <strong>Application submitted successfully.</strong> Keep this receipt for your records.
      </div>

      <div id="receiptContent" class="receipt-box">
        <p class="text-center text-muted">Loading your receipt…</p>
      </div>

      <div class="d-flex gap-2 justify-content-center mt-4 no-print">
        <button class="btn btn-brand" onclick="window.print()">Print Receipt</button>
        <a href="index.html" class="btn btn-outline-secondary">Submit Another Application</a>
      </div>

    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get('id');
const contentEl = document.getElementById('receiptContent');

if (!id) {
  contentEl.innerHTML = '<p class="text-center text-danger">No application ID was provided.</p>';
} else {
  fetch(`/api/applications/${id}`)
    .then(res => res.json())
    .then(result => {
      if (!result.success) {
        contentEl.innerHTML = `<p class="text-center text-danger">${result.message || 'Application not found.'}</p>`;
        return;
      }
      const a = result.data;
      const fullName = `${a.title} ${a.surname} ${a.first_name} ${a.middle_name || ''}`.trim();

      contentEl.innerHTML = `
        <div class="receipt-header">
          <h2 class="h4 fw-bold mb-1">Osun State University</h2>
          <p class="mb-0 text-muted">Information Management and Technology Centre</p>
          <p class="mb-0 fw-semibold mt-2">Staff ID Card Application Receipt</p>
        </div>

        <div class="row mb-3">
          <div class="col-8">
            <p class="mb-1"><strong>Application ID:</strong> ${a.application_id}</p>
            <p class="mb-1"><strong>Name:</strong> ${fullName}</p>
            <p class="mb-1"><strong>Staff Number:</strong> ${a.staff_number}</p>
            <p class="mb-1"><strong>Department:</strong> ${a.department}</p>
            <p class="mb-1"><strong>Designation:</strong> ${a.designation}</p>
            <p class="mb-1"><strong>Application Type:</strong> ${a.application_type}</p>
            <p class="mb-0"><strong>Status:</strong> <span class="status-badge status-${a.status}">${a.status}</span></p>
          </div>
          <div class="col-4 text-end">
            <img src="${a.passport_path}" alt="Passport" style="width:90px;height:108px;object-fit:cover;border-radius:6px;border:1px solid #ddd;">
          </div>
        </div>

        <p class="text-muted small mb-0">Submitted: ${new Date(a.submitted_at).toLocaleString()}</p>
        <p class="text-muted small">Please retain this receipt until your ID card is issued. Contact IMTC if your status remains Pending for more than two weeks.</p>
      `;
    })
    .catch(() => {
      contentEl.innerHTML = '<p class="text-center text-danger">Could not load your receipt. Please check your connection.</p>';
    });
}
</script>
</body>
</html>
