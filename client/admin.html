<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — UNIOSUN IMTC</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-dark brand-bar">
  <div class="container">
    <span class="navbar-brand mb-0 h1 d-flex align-items-center gap-2">
      <span class="brand-crest">ID</span>
      IMTC Admin &mdash; Staff ID Applications
    </span>
  </div>
</nav>

<div class="container py-4">

  <div class="row g-2 mb-3 align-items-end">
    <div class="col-md-4">
      <label class="form-label small">Search by surname</label>
      <input type="text" id="searchSurname" class="form-control" placeholder="e.g. Adebayo">
    </div>
    <div class="col-md-4">
      <label class="form-label small">Search by staff number</label>
      <input type="text" id="searchStaffNumber" class="form-control" placeholder="e.g. UNIOSUN/STAFF/0123">
    </div>
    <div class="col-md-2">
      <button class="btn btn-brand w-100" id="searchBtn">Search</button>
    </div>
    <div class="col-md-2">
      <button class="btn btn-outline-secondary w-100" id="clearBtn">Clear</button>
    </div>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0 align-middle">
          <thead class="table-light">
            <tr>
              <th>Application ID</th>
              <th>Name</th>
              <th>Staff Number</th>
              <th>Department</th>
              <th>Status</th>
              <th>Submitted</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="7" class="text-center text-muted py-4">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <nav class="mt-3">
    <ul class="pagination justify-content-center" id="pagination"></ul>
  </nav>

</div>

<!-- Detail modal -->
<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Application Detail</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="modalBody">Loading…</div>
      <div class="modal-footer">
        <div class="me-auto">
          <label class="small text-muted me-2">Set status:</label>
          <select id="statusSelect" class="form-select form-select-sm d-inline-block w-auto">
            <option>Pending</option>
            <option>Approved</option>
            <option>Rejected</option>
          </select>
          <button class="btn btn-sm btn-brand ms-2" id="updateStatusBtn">Update</button>
        </div>
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
